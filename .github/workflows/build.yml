name: Build Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build plugin
        run: ./gradlew :AutoTimelyKorzina:make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoTimelyKorzina
          path: builds/AutoTimelyKorzina.zip
